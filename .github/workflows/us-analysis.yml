name: US Stock Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * 1-5'   # Mon-Fri 13:45 UTC = 9:45 AM ET (EDT, Mar-Nov)
  push:
    paths:
      - 'u/.trigger'

permissions:
  contents: write

jobs:
  us-analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare==1.18.63 --no-deps
          pip install beautifulsoup4 lxml pandas requests curl_cffi html5lib xlrd tqdm openpyxl tabulate decorator py-mini-racer yfinance
          # jsonpath 0.82 fails to build on newer setuptools — create a stub
          python -c "
          import site, os
          stub = 'def jsonpath(obj, expr, result_type=\"VALUE\", debug=0, use_eval=True):\n    return []\n'
          for d in site.getsitepackages():
              p = os.path.join(d, 'jsonpath.py')
              try:
                  with open(p, 'w') as f: f.write(stub)
                  print('stub ->', p); break
              except Exception: pass
          "

      - name: Run gate check
        run: |
          echo "=== GATE ===" > /tmp/us_report.txt
          cd u/utool && python us_gate.py >> /tmp/us_report.txt 2>&1 || true

      - name: Refresh US price data
        run: |
          echo "" >> /tmp/us_report.txt
          echo "=== DATA REFRESH ===" >> /tmp/us_report.txt
          mkdir -p u/ushare_data
          cd u/utool && python downu.py AMD LRCX WDC NVDA AVGO VRT LITE GEV ETN GD AAOI SNDK HWM CW >> /tmp/us_report.txt 2>&1 || true

      - name: Run Trend Template scan
        run: |
          echo "" >> /tmp/us_report.txt
          echo "=== TREND TEMPLATE ===" >> /tmp/us_report.txt
          cd u/utool && python utrend.py AMD LRCX WDC NVDA AVGO VRT LITE GEV ETN GD AAOI SNDK HWM CW >> /tmp/us_report.txt 2>&1 || true

      - name: AI analysis → bought.md
        env:
          _API_KEY: ${{ secrets._API_KEY }}
        run: |
          # Run AI analysis; if it fails, write raw output preserving 持仓/已平仓
          cd u/utool && python build_brief.py --report /tmp/us_report.txt 2>&1 || {
            echo "AI step failed, writing raw output with preserved sections"
            cd "$GITHUB_WORKSPACE"
            DATE=$(TZ='America/New_York' date '+%Y-%m-%d (%a)')
            python3 -c "
import re
text = open('u/bought.md', encoding='utf-8').read()
m = re.search(r'\n## 当前持仓.*', text, re.DOTALL)
preserved = m.group(0) if m else ''
header = f'# US Stock Daily Brief — ${DATE} (美东)\n\n> 全量 TT 表 + 逐赛道分析 → uwatchlist.md\n\n'
raw = open('/tmp/us_report.txt').read()
open('u/bought.md', 'w', encoding='utf-8').write(header + raw + '\n\n' + preserved)
"
          }
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add u/bought.md u/ushare_data/
          git diff --cached --quiet || git commit -m "data: US analysis $(TZ='America/New_York' date '+%Y-%m-%d %H:%M') ET"
          git push

      - name: Send email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          body = open('u/bought.md', encoding='utf-8').read()
          msg = MIMEMultipart()
          msg['From'] = os.environ['SMTP_USER']
          msg['To'] = os.environ['TO_EMAIL']
          msg['Subject'] = f\"US Stock Daily Brief — $(TZ='America/New_York' date '+%Y-%m-%d')\"
          msg.attach(MIMEText(body, 'plain', 'utf-8'))

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['SMTP_USER'], os.environ['SMTP_PASSWORD'])
              s.send_message(msg)
          print('Email sent.')
          "
