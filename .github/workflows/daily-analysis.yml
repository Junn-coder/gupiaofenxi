name: Daily Stock Analysis

on:
  schedule:
    # 北京时间每天早上 8:00 执行（UTC 时间 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone lifchang tools (scan_cn.py)
        run: |
          LIFCHANG_REPO="${LIFCHANG_REPO:-Junn-coder/lifchang}"
          git clone --depth 1 https://x-access-token:${{ secrets.LIFCHANG_ACCESS }}@github.com/${LIFCHANG_REPO}.git /tmp/lifchang 2>&1 || {
            echo "::error::Clone failed. Check: (1) LIFCHANG_ACCESS secret has repo-read scope, (2) repo path matches '${LIFCHANG_REPO}'"
            exit 1
          }

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r /tmp/lifchang/c/ctool/requirements.txt 2>/dev/null || true

      - name: Run lifchang pipeline → email watchlistd
        run: |
          export PYTHONPATH="/tmp/lifchang/c/ctool:$PYTHONPATH"
          python gpfenxi.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}