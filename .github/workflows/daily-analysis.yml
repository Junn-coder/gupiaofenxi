name: Daily Stock Analysis

on:
  schedule:
    # 北京时间每天早上 8:00 执行（UTC 时间 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone lifchang tools (scan_cn.py)
        run: |
          LIFCHANG_REPO="${LIFCHANG_REPO:-Junn-coder/lifchang}"
          git clone --depth 1 https://x-access-token:${{ secrets.LIFCHANG_ACCESS }}@github.com/${LIFCHANG_REPO}.git /tmp/lifchang 2>&1 || {
            echo "::error::Clone failed. Check: (1) LIFCHANG_ACCESS secret has repo-read scope, (2) repo path matches '${LIFCHANG_REPO}'"
            exit 1
          }

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Warm up index cache
        run: |
          cd /tmp/lifchang/c/ctool
          python index.py -q 2>&1 || echo "index cache warm-up skipped (non-fatal, scan_cn.py will fetch live)"

      - name: Run scan_cn.py → get 3 candidates
        id: scan
        run: |
          export PYTHONPATH="/tmp/lifchang/c/ctool:$PYTHONPATH"
          cd /tmp/lifchang/c/ctool
          echo "=== scan_cn.py raw output ==="
          SCAN_OUT=$(python scan_cn.py --final 3 2>&1)
          echo "$SCAN_OUT"
          echo "=== end scan output ==="
          CODES=$(echo "$SCAN_OUT" | awk '/^[ ]+[1-3]/{print $2}' | tr '\n' ';' | sed 's/;$//')
          if [ -z "$CODES" ]; then
            echo "::warning::No candidates extracted from scan. Raw output above for debug."
          fi
          echo "SCAN_CODES=$CODES" >> $GITHUB_OUTPUT
          echo "Extracted codes: $CODES"

      - name: Run stock analysis with scanned codes
        run: |
          python gpfenxi.py --codes "${{ steps.scan.outputs.SCAN_CODES }}"
        env:
          _API_KEY: ${{ secrets._API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}